<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socially</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="fav-icon.pngs">
</head>
<body>
    <div class="hero">
        <nav>
            <!-- Logo -->
            <img class="logo" src="social.png" alt="logo">
            
            <!-- Mobile Controls & Desktop Buttons -->
            <div class="nav-controls">
                <div class="hamburger" id="menuBtn">
                    <span></span><span></span><span></span>
                </div>
                
                <div class="nav-right">
                    <a href="#" class="login-btn">Log in</a>
                    <a href="#" class="btn download-nav">Download App</a>
                </div>
            </div>

            <!-- Navigation Links -->
            <ul id="navLinks">
                <li><a href="Features.html">Features</a></li>
                <li><a href="#">How it works</a></li>
                <li><a href="#">Privacy</a></li>
            </ul>
        </nav>

        <div class="content-wrapper">
            <div class="text-content">
                <h1 class="anim" style="animation-delay: 0.2s;">Make<br>New Friends</h1>
                <p class="anim" style="animation-delay: 0.5s;">Socially is a new social media platform to make a new friends online in the world. Now let's explore all it's amazing features.</p>
                <a href="#" class="btn anim join-desktop" style="animation-delay: 1.1s;">Join Now</a>
            </div>
            
            <div class="image-box anim" style="animation-delay: 0.8s;">
                <img src="girl-iamge.jpg" class="feature-img" alt="hero-image">
            </div>

            <!-- Mobile Button -->
            <a href="#" class="btn anim join-mobile" style="animation-delay: 1.3s;">Join Now</a>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        
        menuBtn.onclick = (e) => {
            navLinks.classList.toggle('active');
            e.stopPropagation();
        };

        document.onclick = (e) => {
            if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
                navLinks.classList.remove('active');
            }
        };

        const links = document.querySelectorAll('#navLinks li a');
        links.forEach(link => {
            link.onclick = () => {
                navLinks.classList.remove('active');
            };
        });
    </script>
</body>
</html>
